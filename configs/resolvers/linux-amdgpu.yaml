id: linux-amdgpu
language: cpp
context_vars: [adev]
symbol_prefixes: [reg, mm]
wrappers:
  WREG32:
    symbol_arg: 0
    access: write
  RREG32:
    symbol_arg: 0
    access: read
  WREG32_SOC15:
    symbol_arg: 2
    access: write
  RREG32_SOC15:
    symbol_arg: 2
    access: read
  WREG32_SOC15_OFFSET:
    symbol_arg: 2
    access: write
  RREG32_SOC15_OFFSET:
    symbol_arg: 2
    access: read
  SOC15_REG_OFFSET:
    symbol_arg: 2
    access: address
  WREG32_FIELD15:
    symbol_arg: 2
    access: field_write
  REG_SET_FIELD:
    symbol_arg: 1
    access: field_set
  REG_GET_FIELD:
    symbol_arg: 1
    access: field_get
